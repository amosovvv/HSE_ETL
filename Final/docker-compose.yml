version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.7.1
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW_CONN_POSTGRES_TARGET: postgresql://postgres:postgres@postgres/target
    AIRFLOW_CONN_MONGO_SOURCE: mongodb://mongodb:27017
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
  depends_on:
    - postgres
    - mongodb

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: always

  mongodb:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install pymongo psycopg2-binary pandas faker sqlalchemy && \
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install pymongo psycopg2-binary pandas faker sqlalchemy &&
               airflow webserver"
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install pymongo psycopg2-binary pandas faker sqlalchemy &&
               airflow scheduler"
    restart: always

  jupyter:
    image: jupyter/datascience-notebook:latest
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: 'yes'
    volumes:
      - ./notebooks:/home/jovyan/work
    command: >
      bash -c "pip install pymongo psycopg2-binary pandas faker sqlalchemy &&
               start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''"
    restart: always

volumes:
  postgres-data:
  mongo-data: